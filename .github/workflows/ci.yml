name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - run: npm run lint

  jsdoclint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - run: npm run jsdoclint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - run: npx cross-env NODE_ENV=test nyc --reporter=lcov ./node_modules/.bin/_mocha --require @babel/register
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        if: matrix.node-version == 20 && github.event_name == 'push'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - run: npm run check-decl
      - run: ./node_modules/.bin/tsc -p tsconfig.build.json
      - run: npm run typecheck

  docs-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - run: npm run docs
      - run: test -f docs/index.html && test -f docs/porting-scipy.html && test -f docs/styles/style.css
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  # deploy-pages@v4 requires upload-pages-artifact@v3 specifically — see solutions/tooling/2026-05-16-1730-docs-pages-deploy-artifact-action.md
  docs-deploy:
    needs: [docs-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build:
    needs: [lint, jsdoclint, test, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - run: npm run build
      - run: test -f dist/ranjs.esm.js && test -f dist/ranjs.cjs.js && test -f dist/ranjs.min.js && test -f dist/index.d.ts
